name: Update businesses.json from CSV

on:
  push:
    paths:
      - 'businesses_curation.csv'
    branches:
      - main

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run CSV to JSON converter
        run: python3 tools/csv_to_json.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet RoatanInsider/Data/businesses.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated businesses.json
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RoatanInsider/Data/businesses.json
          git commit -m "Auto-update businesses.json from CSV changes"
          git push
